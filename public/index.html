
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e18;--bg2:#111520;--bg3:#181d2e;--bg4:#1e2438;
  --border:#252d42;--border2:#2e3a54;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4e5d78;
  --green:#22c55e;--green2:#15803d;--gbg:#052e16;
  --amber:#f59e0b;--abg:#451a03;
  --red:#ef4444;--rbg:#450a0a;
  --blue:#3b82f6;--bbg:#1e3a5f;
  --purple:#a855f7;--pbg:#3b0764;
  --accent:#3b82f6;
  --sidebar:220px;--rad:8px;--rad-sm:5px;
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--text3);margin-top:1px}
.nav-section{padding:14px 10px 4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rad-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--blue)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border)}
.api-status{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--rad-sm);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text2)}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.api-dot.on{background:var(--green)}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;background:var(--bg2)}
.topbar-title{font-size:14px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text3)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:16px 20px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.metric-val{font-size:26px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.sec-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.table-wrap{overflow-x:auto;border-radius:var(--rad);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;background:var(--bg3);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.td-kw{font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-dm{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-easy{background:var(--gbg);color:var(--green);border:1px solid var(--green2)}
.b-med{background:var(--abg);color:var(--amber);border:1px solid #92400e}
.b-hard{background:var(--rbg);color:var(--red);border:1px solid #7f1d1d}
.b-na{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.b-blue{background:var(--bbg);color:var(--blue);border:1px solid #1e3a5f}
.b-green{background:var(--gbg);color:var(--green);border:1px solid var(--green2)}
.b-purple{background:var(--pbg);color:var(--purple);border:1px solid #6b21a8}
.btn{padding:8px 16px;border:none;border-radius:var(--rad-sm);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:6px;border-radius:var(--rad-sm);background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{border-color:var(--text2);color:var(--text)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad-sm);color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
textarea{resize:vertical;line-height:1.7}
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.search-bar input{flex:1;height:40px;min-height:unset}
.stabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.stab{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .15s}
.stab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stab:hover:not(.active){color:var(--text)}
.stab-content{display:none}.stab-content.active{display:block}
.prog-wrap{margin-top:8px;display:none}
.prog-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;width:0%}
.prog-lbl{font-size:11px;color:var(--text3);margin-top:4px}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:18px;vertical-align:middle}
.sb{width:5px;background:var(--bg4);border-radius:2px;min-height:2px}
.sb.up{background:var(--green)}.sb.dn{background:var(--red)}
.link{color:var(--blue);cursor:pointer}
.link:hover{text-decoration:underline}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:12px 16px;border-radius:var(--rad-sm);font-size:13px;line-height:1.5}
.alert-err{background:var(--rbg);color:var(--red);border:1px solid #7f1d1d}
.alert-info{background:var(--bbg);color:var(--blue);border:1px solid #1e3a5f}
.alert-ok{background:var(--gbg);color:var(--green);border:1px solid var(--green2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{width:100%;max-width:1000px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);flex-shrink:0}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.modal-hd h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:20px}
.api-modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.api-modal-wrap.open{display:flex}
.api-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:28px;width:460px}
.api-modal h2{font-size:16px;font-weight:600;margin-bottom:6px}
.api-modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.api-modal label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:14px}
.api-modal input{width:100%}
.site-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:16px 20px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.site-card:hover{border-color:var(--blue)}
.site-favicon{width:32px;height:32px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.site-info{flex:1;min-width:0}
.site-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-url{font-size:11px;color:var(--text3);margin-top:1px}
.site-metrics{display:flex;gap:20px;margin-top:8px;flex-wrap:wrap}
.site-metric{font-size:11px;color:var(--text3)}
.site-metric strong{color:var(--text);font-weight:600}
.divider{height:1px;background:var(--border);margin:20px 0}
.pt-badge{background:var(--pbg);color:var(--purple);border:1px solid #6b21a8;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
.empty-state{text-align:center;padding:2.5rem;color:var(--text3)}
.empty-state p{font-size:13px}
/* Chart */
.chart-wrap{background:var(--bg3);border-radius:var(--rad);padding:16px;margin-bottom:20px;position:relative}
.chart-title{font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500}
.chart-canvas{width:100%;display:block}
/* DNS table */
.dns-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.dns-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px}
.dns-card h4{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text3);letter-spacing:.06em;margin-bottom:10px}
.dns-record{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text2);word-break:break-all}
.dns-record:last-child{border-bottom:none}
.dns-record strong{color:var(--text);font-weight:500}
/* Overview sections */
.overview-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.chart-wrap svg text{user-select:none}
@media(max-width:900px){.overview-grid{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,1fr)}.dns-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div><div class="brand-name">SEO Pro</div><div class="brand-sub">专业分析工具</div></div>
  </div>
  <div class="nav-section">
    <div class="nav-label">概览</div>
    <div class="nav-item active" onclick="nav('dashboard',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>仪表盘</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">站点</div>
    <div class="nav-item" onclick="nav('site-explorer',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>站点分析</div>
    <div class="nav-item" onclick="nav('my-sites',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>我的站点</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">关键词</div>
    <div class="nav-item" onclick="nav('keyword-explorer',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>关键词分析</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">外链</div>
    <div class="nav-item" onclick="nav('backlinks',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>外链分析</div>
  </div>
  <div class="sidebar-footer">
    <div class="api-status" onclick="openApiModal()"><div class="api-dot" id="api-dot"></div><span id="api-status-text">点击配置 API</span></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div><div class="topbar-title" id="topbar-title">仪表盘</div><div class="topbar-sub" id="topbar-sub">概览</div></div>
    <div class="topbar-actions"><button class="btn btn-ghost btn-sm" onclick="openApiModal()">⚙ API 设置</button></div>
  </div>
  <div class="content" id="main-content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="grid-3" style="margin-bottom:20px">
        <div class="metric-card"><div class="metric-label">我的站点</div><div class="metric-val" id="d-sites">0</div><div class="metric-sub">已监控站点</div></div>
        <div class="metric-card"><div class="metric-label">本次关键词查询</div><div class="metric-val" id="d-kws">0</div><div class="metric-sub">本次会话</div></div>
        <div class="metric-card"><div class="metric-label">本次域名分析</div><div class="metric-val" id="d-domains">0</div><div class="metric-sub">本次会话</div></div>
      </div>
      <div class="sec-title">我的站点 <span><button class="btn btn-ghost btn-sm" onclick="nav('my-sites',null)">管理站点 →</button></span></div>
      <div id="dash-sites-preview"><div class="empty-state"><p>还没有添加站点，前往「我的站点」添加</p></div></div>
      <div class="divider"></div>
      <div class="sec-title">快速入口</div>
      <div class="grid-3">
        <div class="card-sm" style="cursor:pointer" onclick="nav('keyword-explorer',null)"><div style="font-size:13px;font-weight:600;margin-bottom:6px">🔍 关键词分析</div><div style="font-size:12px;color:var(--text3)">搜索量、KD难度、CPC、相关词</div></div>
        <div class="card-sm" style="cursor:pointer" onclick="nav('site-explorer',null)"><div style="font-size:13px;font-weight:600;margin-bottom:6px">🌐 站点分析</div><div style="font-size:12px;color:var(--text3)">DR、流量、关键词、外链、DNS</div></div>
        <div class="card-sm" style="cursor:pointer" onclick="nav('backlinks',null)"><div style="font-size:13px;font-weight:600;margin-bottom:6px">🔗 外链分析</div><div style="font-size:12px;color:var(--text3)">引用域名、外链详情、锚文本</div></div>
      </div>
    </div>

    <!-- SITE EXPLORER -->
    <div class="page" id="page-site-explorer">
      <div class="search-bar">
        <input type="text" id="se-input" placeholder="输入域名，如 example.com" onkeydown="if(event.key==='Enter')runSiteExplorer()">
        <button class="btn btn-primary" onclick="runSiteExplorer()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>分析</button>
      </div>
      <div class="prog-wrap" id="se-pw"><div class="prog-bar"><div class="prog-fill" id="se-pf"></div></div><div class="prog-lbl" id="se-pl"></div></div>
      <div id="se-res"></div>
    </div>

    <!-- MY SITES -->
    <div class="page" id="page-my-sites">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <input type="text" id="ms-input" placeholder="添加域名，如 example.com" style="flex:1;max-width:360px" onkeydown="if(event.key==='Enter')addMySite()">
        <button class="btn btn-primary" onclick="addMySite()">+ 添加站点</button>
      </div>
      <div id="my-sites-list"></div>
    </div>

    <!-- KEYWORD EXPLORER -->
    <div class="page" id="page-keyword-explorer">
      <div style="display:flex;gap:8px;margin-bottom:20px;align-items:flex-start">
        <textarea id="kw-input" placeholder="每行一个关键词，最多20个&#10;gearbox&#10;industrial gearbox&#10;waterproof connector" style="flex:1;min-height:90px;max-height:160px"></textarea>
        <div style="display:flex;flex-direction:column;gap:8px">
          <select id="kw-se" style="width:110px">
            <option value="google">🔍 Google</option>
            <option value="bing">🔎 Bing</option>
          </select>
          <select id="kw-loc" style="width:148px">
            <option value="2840">🇺🇸 美国</option><option value="2826">🇬🇧 英国</option><option value="2276">🇩🇪 德国</option>
            <option value="2250">🇫🇷 法国</option><option value="2036">🇦🇺 澳大利亚</option><option value="2124">🇨🇦 加拿大</option>
            <option value="2392">🇯🇵 日本</option><option value="2356">🇮🇳 印度</option><option value="2076">🇧🇷 巴西</option>
            <option value="2528">🇳🇱 荷兰</option><option value="2380">🇮🇹 意大利</option><option value="2724">🇪🇸 西班牙</option>
          </select>
          <button class="btn btn-primary" id="kw-btn" onclick="runKw()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>查询</button>
        </div>
      </div>
      <div class="prog-wrap" id="kw-pw"><div class="prog-bar"><div class="prog-fill" id="kw-pf"></div></div><div class="prog-lbl" id="kw-pl"></div></div>
      <div id="kw-res"></div>
    </div>

    <!-- KW DETAIL -->
    <div class="page" id="page-kw-detail">
      <button class="btn btn-ghost btn-sm" onclick="nav('keyword-explorer',null)" style="margin-bottom:16px">← 返回关键词列表</button>
      <div id="kw-detail-body"><div class="loading">加载中...</div></div>
    </div>

    <!-- BACKLINKS -->
    <div class="page" id="page-backlinks">
      <div class="search-bar">
        <input type="text" id="bl-input" placeholder="输入域名，如 example.com" onkeydown="if(event.key==='Enter')runBacklinks()">
        <button class="btn btn-primary" onclick="runBacklinks()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>查询</button>
      </div>
      <div class="prog-wrap" id="bl-pw"><div class="prog-bar"><div class="prog-fill" id="bl-pf"></div></div><div class="prog-lbl" id="bl-pl"></div></div>
      <div id="bl-res"></div>
    </div>

  </div>
</div>

<!-- API MODAL -->
<div class="api-modal-wrap" id="api-modal">
  <div class="api-modal">
    <h2>🔑 API 设置</h2>

async function apiFetch(method,path,body){
  if(!S.login||!S.pass) throw new Error('请先在左下角配置 API 登录信息');
  const opts={method,headers:{'Content-Type':'application/json','login':S.login,'password':S.pass}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  if(!r.ok){const t=await r.text();throw new Error(`HTTP ${r.status}: ${t.slice(0,200)}`);}
  return r.json();
}

function fmt(n){if(n===null||n===undefined||n==='')return'—';n=Number(n);if(isNaN(n))return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(Math.round(n));}
function kdBdg(v){if(v==null)return'<span class="bdg b-na">N/A</span>';const n=Number(v);if(n<30)return`<span class="bdg b-easy">KD ${n}</span>`;if(n<60)return`<span class="bdg b-med">KD ${n}</span>`;return`<span class="bdg b-hard">KD ${n}</span>`;}
function drBdg(v){if(v==null)return'<span class="bdg b-na">DR —</span>';const n=Math.round(Number(v));if(n>=70)return`<span class="bdg b-green">DR ${n}</span>`;if(n>=40)return`<span class="bdg b-med">DR ${n}</span>`;return`<span class="bdg b-na">DR ${n}</span>`;}
function spark(arr){if(!arr||!arr.length)return'—';const max=Math.max(...arr)||1;return'<div class="spark">'+arr.map((v,i)=>{const h=Math.max(2,Math.round((v/max)*16));const c=i>0&&v>arr[i-1]?'up':i>0&&v<arr[i-1]?'dn':'';return`<div class="sb ${c}" style="height:${h}px"></div>`}).join('')+'</div>';}

/* SVG Line Chart */
function svgLineChart(data,labels,color,W2,H2){
  if(!data||data.length<2)return'<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">数据不足</div>';
  const pad={t:14,r:16,b:32,l:52};
  const W=W2-pad.l-pad.r,H=H2-pad.t-pad.b;
  const maxV=Math.max(...data)||1,minV=0;
  const pts=data.map((v,i)=>{
    const x=pad.l+(i/(data.length-1))*W;
    const y=pad.t+H-((v-minV)/(maxV-minV))*H;
    return[x,y];
  });
  const poly=pts.map(([x,y])=>x+','+y).join(' ');
  const fillPts=pad.l+','+(pad.t+H)+' '+poly+' '+(pad.l+W)+','+(pad.t+H);
  // Y axis: 5 ticks
  const yTicks=5;
  let yAxis='';
  for(let i=0;i<=yTicks;i++){
    const v=Math.round((maxV/yTicks)*i);
    const y=pad.t+H-((v/maxV)*H);
    const lbl=v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':String(v);
    yAxis+=`<line x1="${pad.l}" y1="${y}" x2="${pad.l+W}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    yAxis+=`<text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#4e5d78" font-family="sans-serif">${lbl}</text>`;
  }
  // X axis: up to 8 labels evenly spaced
  let xAxis='';
  const maxLabels=8;
  const step=Math.max(1,Math.floor(labels.length/maxLabels));
  for(let i=0;i<labels.length;i+=step){
    const x=pad.l+(i/(data.length-1))*W;
    xAxis+=`<text x="${x}" y="${pad.t+H+20}" text-anchor="middle" font-size="10" fill="#4e5d78" font-family="sans-serif">${labels[i]||''}</text>`;
  }
  // Hover points
  let circles=pts.map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="3" fill="${color}" opacity="0" class="chart-pt"><title>${labels[i]||''}: ${data[i]}</title></circle>`).join('');
  // Last point always visible
  const [lx,ly]=pts[pts.length-1];
  circles+=`<circle cx="${lx}" cy="${ly}" r="4" fill="${color}"/>`;
  return`<svg viewBox="0 0 ${W2} ${H2}" style="width:100%;height:${H2}px;display:block" xmlns="http://www.w3.org/2000/svg">
    <style>.chart-pt:hover{opacity:1;r:5}</style>
    <defs><linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${yAxis}
    <polygon points="${fillPts}" fill="url(#g${color.replace('#','')})"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${circles}${xAxis}
  </svg>`;
}


function sliceHist(items,months){
  if(!months||months===0)return items;
  return items.slice(-months);
}
function renderTrafficChart(items,months){
  const sl=sliceHist(items,months);
  const dates=sl.map(i=>(i.date||'').slice(0,7));
  const vals=sl.map(i=>i.metrics&&i.metrics.organic&&i.metrics.organic.etv||0);
  return svgLineChart(vals,dates,'#3b82f6',700,150);
}
function renderKwsChart(items,months){
  const sl=sliceHist(items,months);
  const dates=sl.map(i=>(i.date||'').slice(0,7));
  const vals=sl.map(i=>i.metrics&&i.metrics.organic&&i.metrics.organic.count||0);
  return svgLineChart(vals,dates,'#22c55e',300,150);
}

}

async function addMySite(){
  const v=document.getElementById('ms-input').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'');
  if(!v||!v.includes('.')){alert('请输入有效域名');return;}
  if(S.mySites.find(s=>s.domain===v)){alert('该域名已添加');return;}
  S.mySites.push({domain:v,dr:null,traffic:null,kws:null,backlinks:null});
  saveSites();renderMySites();updateDash();
  document.getElementById('ms-input').value='';
  await refreshSite(S.mySites.length-1);
}

async function refreshSite(idx){
  const s=S.mySites[idx];
  try{
    const [bkData,ovData]=await Promise.all([
      apiFetch('POST','/api/dataforseo/backlinks/summary/live',[{target:s.domain,include_subdomains:true}]),
      apiFetch('POST','/api/dataforseo/dataforseo_labs/google/domain_rank_overview/live',[{target:s.domain,location_code:2840,language_code:'en'}])
    ]);
    // FIX: just grab first result, no strict target matching
    (bkData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>{s.dr=r.rank;s.backlinks=r.backlinks;s.ref_domains=r.referring_domains;s.ref_ips=r.referring_ips;}));
    (ovData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>{const item=r.items&&r.items[0];if(item&&item.metrics){s.traffic=item.metrics.organic&&item.metrics.organic.etv;s.kws=item.metrics.organic&&item.metrics.organic.count;}}));
    s.fetched=new Date().toLocaleDateString('zh-CN');
    S.mySites[idx]=s;saveSites();renderMySites();updateDash();
  }catch(e){alert('刷新失败: '+e.message);}
}

function removeSite(idx){if(confirm('确认删除？')){S.mySites.splice(idx,1);saveSites();renderMySites();updateDash();}}

/* SITE EXPLORER */
async function runSiteExplorer(){
  const domain=document.getElementById('se-input').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'');
  if(!domain){showErr('se-res','请输入域名');return;}
  document.getElementById('se-res').innerHTML='<div class="loading"><span class="spin"></span>正在分析 '+domain+'...</div>';
  setProg('se',5,'初始化...');
  try{
    setProg('se',15,'获取外链和流量数据...');
    // Run all in parallel, each with individual catch so one failure doesn't block others
    const [bkData,ovData,rdData,kwData2,histData,dnsData]=await Promise.all([
      apiFetch('POST','/api/dataforseo/backlinks/summary/live',[{target:domain,include_subdomains:true}]).catch(e=>({_err:e.message,tasks:[]})),
      apiFetch('POST','/api/dataforseo/dataforseo_labs/google/domain_rank_overview/live',[{target:domain,location_code:2840,language_code:'en'}]).catch(()=>({tasks:[]})),
      apiFetch('POST','/api/dataforseo/backlinks/referring_domains/live',[{target:domain,limit:10,order_by:['rank,desc'],include_subdomains:true}]).catch(()=>({tasks:[]})),
      apiFetch('POST','/api/dataforseo/dataforseo_labs/google/ranked_keywords/live',[{target:domain,location_code:2840,language_code:'en',limit:10,order_by:['keyword_data.keyword_info.search_volume,desc']}]).catch(()=>({tasks:[]})),
      apiFetch('POST','/api/dataforseo/dataforseo_labs/google/historical_rank_overview/live',[{target:domain,location_code:2840,language_code:'en'}]).catch(()=>({tasks:[]})),
      // DNS: A record for IP, NS for nameservers, MX for mail, TXT for verification
      Promise.all([
        fetch('https://dns.google/resolve?name='+domain+'&type=A'),
        fetch('https://dns.google/resolve?name='+domain+'&type=NS'),
        fetch('https://dns.google/resolve?name='+domain+'&type=MX'),
        fetch('https://dns.google/resolve?name='+domain+'&type=TXT')
      ]).then(rs=>Promise.all(rs.map(r=>r.json()))).then(([a,ns,mx,txt])=>({a,ns,mx,txt})).catch(()=>null)
    ]);

    setProg('se',80,'解析数据...');

    // Parse backlinks - try multiple field paths DataForSEO may use
    let bk={rank:null,referring_domains:null,backlinks:null,referring_main_domains:null};
    (bkData.tasks||[]).forEach(t=>{
      (t.result||[]).forEach(r=>{
        // DataForSEO backlinks/summary fields
        if(r.rank!=null) bk.rank=r.rank;
        if(r.referring_domains!=null) bk.referring_domains=r.referring_domains;
        if(r.referring_main_domains!=null) bk.referring_domains=r.referring_main_domains; // alt field name
        if(r.backlinks!=null) bk.backlinks=r.backlinks;
        if(r.referring_ips!=null) bk.referring_ips=r.referring_ips;
      });
    });

    // Parse organic overview
    let ov={etv:null,kws:null};
    (ovData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>{
      const item=r.items&&r.items[0];
      if(item&&item.metrics){
        ov.etv=item.metrics.organic&&item.metrics.organic.etv;
        ov.kws=item.metrics.organic&&item.metrics.organic.count;
      }
    }));

    // Get A record IP from DNS
    const aRecords=(dnsData&&dnsData.a&&dnsData.a.Answer||[]).filter(r=>r.type===1).map(r=>r.data);

    const topRd=[];
    (rdData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>topRd.push(...(r.items||[]).slice(0,10))));

    const topKws=[];
    (kwData2.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>topKws.push(...(r.items||[]).slice(0,10))));

    let histItems=[];
    (histData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>{
      histItems=[...(r.items||[])].sort((a,b)=>a.date>b.date?1:-1);
    }));

    S.sessionDomains++;updateDash();
    setProg('se',100,'完成');
    renderSiteExplorer(domain,bk,ov,topRd,topKws,histItems,dnsData,aRecords);
  }catch(e){document.getElementById('se-res').innerHTML='';showErr('se-res',e.message);}
  finally{hideProg('se');}
}

function renderSiteExplorer(domain,bk,ov,topRd,topKws,histItems,dnsData,aRecords){
  const hasBacklinkData=bk&&(bk.rank!=null||bk.referring_domains!=null||bk.backlinks!=null);
  const hasOvData=ov&&(ov.etv!=null||ov.kws!=null);
  // Metrics row
  let noDataWarn='';
  if(!hasBacklinkData&&!hasOvData){noDataWarn=`<div style="background:var(--abg);border:1px solid #92400e;border-radius:var(--rad);padding:20px;margin-bottom:20px">
    <div style="font-size:14px;font-weight:600;color:var(--amber);margin-bottom:8px">⚠ 该域名在数据库中暂无记录</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6">
      <b>${domain}</b> 在数据库中没有外链或流量数据，原因可能是：<br>
      • 该站点是新站点，还未被收录<br>
      • 该站点流量/外链极低，未达到收录门槛<br>
      • 请换一个有一定规模的域名测试，例如：<br>
      <span onclick="document.getElementById('se-input').value='great-ocean-waterproof.com';runSiteExplorer()" style="color:var(--blue);cursor:pointer;text-decoration:underline">great-ocean-waterproof.com</span>
      &nbsp;或&nbsp;

function switchSTab(id,el,cls){
  document.querySelectorAll('.'+cls).forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.stab-content').forEach(c=>{if(c.id&&document.getElementById(id)&&c.closest&&c.closest('#se-res,#kw-res,#bl-res,#kw-detail-body'))c.classList.remove('active');});
  // simpler: just toggle within the same parent
  el.closest('.stabs').parentNode.querySelectorAll('.stab-content').forEach(c=>c.classList.remove('active'));
  el.closest('.stabs').querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const target=document.getElementById(id);if(target)target.classList.add('active');
}

/* KEYWORD EXPLORER */
const LOC_FLAGS={2840:'🇺🇸',2826:'🇬🇧',2276:'🇩🇪',2250:'🇫🇷',2036:'🇦🇺',2124:'🇨🇦',2392:'🇯🇵',2356:'🇮🇳',2076:'🇧🇷',2528:'🇳🇱',2380:'🇮🇹',2724:'🇪🇸'};
const SE_SUG={google:'dataforseo_labs/google/keyword_suggestions/live',bing:'dataforseo_labs/bing/keyword_suggestions/live'};
const SE_IDEAS={google:'dataforseo_labs/google/keyword_ideas/live',bing:'dataforseo_labs/bing/keyword_ideas/live'};

async function runKw(){
  const kws=document.getElementById('kw-input').value.split('\n').map(l=>l.trim()).filter(Boolean).slice(0,20);
  if(!kws.length){showErr('kw-res','请输入关键词');return;}
  const loc=parseInt(document.getElementById('kw-loc').value);
  const se=document.getElementById('kw-se').value||'google';
  document.getElementById('kw-btn').disabled=true;
  document.getElementById('kw-res').innerHTML='<div class="loading"><span class="spin"></span>查询中 ('+se.toUpperCase()+')...</div>';
  setProg('kw',10,'获取关键词数据...');
  try{
    const sugPayload=kws.map(k=>({keyword:k,location_code:loc,language_code:'en',include_seed_keyword:true,limit:20}));
    const sugData=await apiFetch('POST','/api/dataforseo/'+(SE_SUG[se]||SE_SUG.google),sugPayload);
    setProg('kw',55,'获取问题词...');
    const qPayload=kws.map(k=>({keywords:[k],location_code:loc,language_code:'en',limit:15,filters:['keyword','like','%how%','or','keyword','like','%what%','or','keyword','like','%why%','or','keyword','like','%which%']}));
    let questData={tasks:[]};
    try{questData=await apiFetch('POST','/api/dataforseo/'+(SE_IDEAS[se]||SE_IDEAS.google),qPayload);}catch(e){}
    setProg('kw',85,'整理数据...');
    if(sugData.status_code!==20000) throw new Error(sugData.status_message||'API错误');
    const main=[],rel=[],q=[];
    const inputSet=new Set(kws.map(k=>k.toLowerCase())),seen=new Set(),seenQ=new Set(),parentMap={};
    (sugData.tasks||[]).forEach((t,ti)=>{
      const seedKw=kws[ti]||'';let topSv=0,topKw='';
      (t.result||[]).forEach(r=>{
        if(r.seed_keyword_data){const row=parseKwItem(r.seed_keyword_data);if(row.kw){const lk=row.kw.toLowerCase();if(!seen.has(lk)){seen.add(lk);main.push(row);}}}
        (r.items||[]).forEach(item=>{
          const row=parseKwItem(item);if(!row.kw)return;const lk=row.kw.toLowerCase();
          if((row.sv||0)>topSv){topSv=row.sv||0;topKw=row.kw;}
          if(isQ(lk)){if(!seenQ.has(lk)){seenQ.add(lk);q.push(row);}}
          else if(!inputSet.has(lk)&&!seen.has(lk)){seen.add(lk);rel.push(row);}
        });
      });
      if(topKw)parentMap[seedKw.toLowerCase()]=topKw;
    });
    (questData.tasks||[]).forEach(t=>(t.result||[]).forEach(r=>(r.items||[]).forEach(item=>{const row=parseKwItem(item);if(row.kw&&!seenQ.has(row.kw.toLowerCase())){seenQ.add(row.kw.toLowerCase());q.push(row);}})));
    main.sort((a,b)=>{const ai=inputSet.has((a.kw||'').toLowerCase())?1:0,bi=inputSet.has((b.kw||'').toLowerCase())?1:0;return bi-ai||(b.sv||0)-(a.sv||0);});
    rel.sort((a,b)=>(b.sv||0)-(a.sv||0));q.sort((a,b)=>(b.sv||0)-(a.sv||0));
    S.kwResults={main,rel,q};S.kwParentMap=parentMap;S.kwInputSet=inputSet;S.sessionKws+=main.length;updateDash();
    setProg('kw',100,'完成');renderKwResults(main,rel,q,parentMap,inputSet,se,loc);
  }catch(e){document.getElementById('kw-res').innerHTML='';showErr('kw-res',e.message);}
  finally{document.getElementById('kw-btn').disabled=false;hideProg('kw');}
}

function kwRow(r,showPT,parentMap,inputSet){
  const isSeed=inputSet&&inputSet.has((r.kw||'').toLowerCase());
  const pt=showPT&&parentMap&&parentMap[(r.kw||'').toLowerCase()]?`<span class="pt-badge">${parentMap[(r.kw||'').toLowerCase()]}</span>`:'—';
  const kwCell=`<span class="link" onclick="openKwDetail('${(r.kw||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${isSeed?`<strong>${r.kw}</strong>`:r.kw||'—'}</span>`;
  return`<tr><td class="td-kw" title="${r.kw||''}">${kwCell}</td><td>${fmt(r.sv)}</td><td>${kdBdg(r.kd)}</td><td>${r.cpc?'$'+Number(r.cpc).toFixed(2):'—'}</td><td>${spark(r.trend)}</td>${showPT?`<td>${pt}</td>`:''}</tr>`;
}

function kwTable(rows,showPT,parentMap,inputSet,pageSize,page){
  if(!rows||!rows.length)return'<div class="empty-state"><p>暂无数据</p></div>';
  const ps=pageSize||50,pg=page||0;
  const total=rows.length,pages=Math.ceil(total/ps);
  const slice=rows.slice(pg*ps,(pg+1)*ps);
  const ptCol=showPT?'<th style="min-width:140px">Parent Topic</th>':'';
  let h=`<div class="table-wrap"><table><thead><tr><th style="min-width:210px">关键词</th><th>月均搜索量</th><th>难度</th><th>CPC</th><th style="min-width:110px">近6月趋势</th>${ptCol}</tr></thead><tbody>${slice.map(r=>kwRow(r,showPT,parentMap,inputSet)).join('')}</tbody></table></div>`;
  if(pages>1){
    const tblId='kwtbl_'+Math.random().toString(36).slice(2,7);
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:0 4px">
      <span style="font-size:12px;color:var(--text3)">第 ${pg+1} / ${pages} 页，共 ${total} 条</span>
      <div style="display:flex;gap:6px">
        ${pg>0?`<button class="btn btn-ghost btn-sm" onclick="reRenderKwTable(this,${pg-1})">← 上一页</button>`:''}
        ${pg<pages-1?`<button class="btn btn-ghost btn-sm" onclick="reRenderKwTable(this,${pg+1})">下一页 →</button>`:''}
      </div>
    </div>`;
  }
  return h;
}

// Store rows for pagination re-render
const _kwTableData={};
function kwTablePaged(rows,showPT,parentMap,inputSet,containerId){
  _kwTableData[containerId]={rows,showPT,parentMap,inputSet};

}
function reRenderKwTable(btn,newPage){
  const container=btn.closest('[data-kwtbl]')||btn.closest('.stab-content');
  if(!container)return;
  const id=container.id;
  const d=_kwTableData[id];
  if(!d)return;
  container.innerHTML=kwTable(d.rows,d.showPT,d.parentMap,d.inputSet,50,newPage);
}

function renderKwResults(main,rel,q,parentMap,inputSet,se,loc){

    if(!allItems.length) h+='<div class="empty-state" style="padding:1.5rem"><p>该市场暂无排名数据</p></div>';
    document.getElementById('modal-body').innerHTML=h;
  }catch(e){document.getElementById('modal-body').innerHTML=`<div class="alert alert-err">⚠ ${e.message}</div>`;}
}

function exportModalData(type){
  const d=MP[type];if(!d||!d.items||!d.items.length){alert('暂无数据可导出');return;}
  let csv,name;
  if(type==='rd'){
    csv='域名,DR,引用域名数,总外链数\n'+d.items.map(i=>`${i.domain||''},${i.rank||''},${i.referring_domains||''},${i.backlinks||''}`).join('\n');name='referring_domains.csv';
  }else if(type==='bk'){
    csv='来源URL,目标URL,锚文本,DR,dofollow,首次发现\n'+d.items.map(i=>`"${i.url_from||''}","${i.url_to||''}","${i.anchor||''}",${i.rank||''},${i.dofollow||false},"${i.first_seen||''}"`).join('\n');name='backlinks.csv';
  }else if(type==='kws'){
    csv='关键词,月均搜索量,KD,CPC,排名\n'+d.items.map(i=>{const kd2=i.keyword_data||{};const ki=kd2.keyword_info||{};const kp=kd2.keyword_properties||{};const pos=(i.ranked_serp_element&&i.ranked_serp_element.serp_item&&i.ranked_serp_element.serp_item.rank_absolute)||'';return`"${kd2.keyword||''}",${ki.search_volume||''},${kp.keyword_difficulty||''},${ki.cpc||''},${pos}`;}).join('\n');name='organic_keywords.csv';
  }
  dlCsv(csv,name);
}
